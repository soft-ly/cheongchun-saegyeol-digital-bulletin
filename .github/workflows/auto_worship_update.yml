name: Auto Update Worship Video

on:
  schedule:
    # Run every Tuesday at 00:00 UTC (which is 09:00 KST)
    - cron: '0 0 * * 2'
  workflow_dispatch: # Allows manual run in the GitHub Actions tab

permissions:
  contents: write

jobs:
  update-worship:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run update script
        run: python scripts/auto_update_sermon.py

      - name: Commit and push if index.html changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update Worship tab with latest sermon"
            git push
          fi
